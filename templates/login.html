<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login · 43 Industries</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #222, #050509 55%);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f5f5f5;
    }
    .card {
      width: 100%;
      max-width: 360px;
      background: rgba(5,5,10,0.92);
      border-radius: 0.9rem;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 1.8rem 1.6rem 1.6rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }
    .logo {
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 0.8rem;
      margin-bottom: 0.75rem;
      opacity: 0.9;
    }
    .logo span { color: #ff3c1f; }
    h1 {
      margin: 0 0 0.4rem;
      font-size: 1.4rem;
    }
    .muted {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-bottom: 1.2rem;
    }
    label {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.75;
      display: block;
      margin-bottom: 0.4rem;
    }
    input[type="password"] {
      width: 100%;
      padding: 0.6rem 0.7rem;
      border-radius: 0.5rem;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(3,3,8,0.9);
      color: #f5f5f5;
      font-size: 0.9rem;
      outline: none;
    }
    input[type="password"]:focus {
      border-color: #ff3c1f;
      box-shadow: 0 0 0 1px rgba(255,60,31,0.45);
    }
    .error {
      color: #ff6b5a;
      font-size: 0.8rem;
      margin-top: 0.4rem;
      margin-bottom: 0.6rem;
    }
    button {
      margin-top: 0.9rem;
      width: 100%;
      padding: 0.7rem 0.8rem;
      border-radius: 999px;
      border: none;
      background: #ff3c1f;
      color: #050509;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
    }
    button:hover {
      filter: brightness(1.05);
    }
    .back-link {
      display: inline-block;
      margin-top: 0.9rem;
      font-size: 0.78rem;
      text-decoration: none;
      color: #b3b3ff;
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">43<span>.</span>Industries</div>
    <h1>Admin access</h1>
    <p class="muted">Enter the admin password to view submissions.</p>

    <form method="post">
      <label for="password">Password</label>
      <input id="password" type="password" name="password" required>
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
      <button type="submit">Continue</button>
    </form>
    <a class="back-link" href="/">← Back to site</a>
  </div>
</body>
</html>
